[workspace]
authors = ["Michael Johnson <mjohnson459@gmail.com>"]
channels = ["conda-forge"]
name = "scservo-linux"
platforms = ["linux-64", "linux-aarch64"]
version = "1.0.0"
preview = ["pixi-build"]

# Default environment: toolchain to develop the library locally (`pixi run build`).
[dependencies]
cmake = ">=3.14,<5"
cxx-compiler = "*"
ninja = "*"

[package]
name = "scservo-linux"
version = { workspace = true }
homepage = "https://github.com/MJohnson459/SCServo_Linux"
license = "MIT"
license-file = "LICENSE"

[package.build]
backend = { name = "pixi-build-cmake", version = "*", channels = [
    "conda-forge",
] }

[tasks]
build = "cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build"
publish = "pixi publish --to https://prefix.dev/robot && pixi publish --target-platform linux-aarch64 --to https://prefix.dev/robot"
